name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ci:
    name: CI Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run checks
        run: npm run check

      - name: Run tests
        run: npm test

  build:
    needs: ci
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-13
            target: mac
            rust_target: x86_64-apple-darwin
            label: macOS-x64
          - platform: macos-14
            target: mac
            rust_target: aarch64-apple-darwin
            label: macOS-ARM64
          - platform: windows-latest
            target: win
            rust_target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: linux
            rust_target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.label }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libayatana-appindicator3-dev

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Rebuild native modules (Windows only)
        if: matrix.target == 'win'
        run: npm rebuild

      - name: Build Tauri app (macOS)
        if: matrix.target == 'mac'
        run: npm run tauri:build -- --target ${{ matrix.rust_target }}

      - name: Build Tauri app (Windows)
        if: matrix.target == 'win'
        run: npm run tauri:build -- --target ${{ matrix.rust_target }}

      - name: Build Tauri app (Linux)
        if: matrix.target == 'linux'
        run: npm run tauri:build -- --target ${{ matrix.rust_target }}

      - name: List bundle outputs
        shell: bash
        run: |
          echo "=== src-tauri/target/release/bundle directory ==="
          find src-tauri/target/release/bundle -type f 2>/dev/null || echo "No bundle outputs found"

      - name: Upload artifacts (macOS)
        if: matrix.target == 'mac'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: |
            src-tauri/target/*/release/bundle/dmg/*.dmg
            src-tauri/target/*/release/bundle/macos/*.app.tar.gz
          if-no-files-found: warn

      - name: Upload artifacts (Windows)
        if: matrix.target == 'win'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: |
            src-tauri/target/*/release/bundle/msi/*.msi
            src-tauri/target/*/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Upload artifacts (Linux)
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.label }}
          path: |
            src-tauri/target/*/release/bundle/appimage/*.AppImage
            src-tauri/target/*/release/bundle/deb/*.deb
            src-tauri/target/*/release/bundle/rpm/*.rpm
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    name: Create Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List all downloaded artifacts
        run: find artifacts -type f || echo "No artifacts found"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.tar.gz
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
